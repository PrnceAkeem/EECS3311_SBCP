<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synergy Consulting: Payment Methods</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="./images/logo.png" type="image/png">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/booking.css">
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <header class="topbar">
    <a class="brand-link" href="client.html">
      <img src="./images/logo.png" alt="Synergy Consulting logo">
      <span>Synergy Consulting</span>
    </a>
    <a class="logout-btn" href="./index.html">Logout</a>
  </header>

  <nav class="subnav" aria-label="Client navigation">
    <a class="subnav-link" href="client.html">Browse Services</a>
    <a class="subnav-link" href="booking.html">My Bookings</a>
    <a class="subnav-link" href="history.html">Payments</a>
    <a class="subnav-link active" href="methods.html">Pay Methods</a>
  </nav>

  <main class="page-shell">
    <div class="heading">
      <h1>Payment Methods</h1>
      <h2>Add, edit, and remove saved payment methods</h2>
    </div>
  </main>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Details</th>
          <th>Added</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="methodsTableBody">
        <tr>
          <td colspan="4" class="empty-bookings">Loading&hellip;</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="stack-button-row">
    <button type="button" class="action-btn" id="openAddMethodBtn">+ Add Payment Method</button>
  </div>

  <div class="pay-modal-overlay" id="addMethodModal" style="display:none;">
    <div class="pay-modal">
      <button type="button" class="pay-modal-close" id="addMethodClose" aria-label="Close">&#x2715;</button>
      <div class="pay-modal-header">
        <h2>Add Payment Method</h2>
        <p class="pay-modal-sub">Simulated storage only. No real charges occur.</p>
      </div>

      <div class="pay-modal-body">
        <div class="add-method-form">
          <label class="form-label">
            Method Type
            <select id="methodTypeSelect" class="form-select">
              <option value="">Select a type&hellip;</option>
              <option value="Credit Card">Credit Card</option>
              <option value="Debit Card">Debit Card</option>
              <option value="Bank Transfer">Bank Transfer</option>
              <option value="PayPal">PayPal</option>
            </select>
          </label>

          <div id="cardFields" style="display:none;">
            <label class="form-label">
              Cardholder Name
              <input type="text" id="cardName" class="form-input" maxlength="60" placeholder="e.g. Prince Akeem" />
            </label>
            <label class="form-label">
              Card Number (16 digits)
              <input type="text" id="cardNumber" class="form-input" maxlength="19" placeholder="1111 2222 3333 4444" />
            </label>
            <label class="form-label">
              Expiry (MM/YY)
              <input type="text" id="cardExpiry" class="form-input" maxlength="5" placeholder="08/30" />
            </label>
            <label class="form-label">
              CVV (3-4 digits)
              <input type="text" id="cardCvv" class="form-input" maxlength="4" placeholder="123" />
            </label>
          </div>

          <div id="btFields" style="display:none;">
            <label class="form-label">
              Bank Name
              <input type="text" id="btBank" class="form-input" maxlength="60" placeholder="e.g. TD Bank" />
            </label>
            <label class="form-label">
              Account Number
              <input type="text" id="btAccount" class="form-input" maxlength="17" placeholder="6-17 digits" />
            </label>
            <label class="form-label">
              Routing Number (9 digits)
              <input type="text" id="btRouting" class="form-input" maxlength="9" placeholder="123456789" />
            </label>
          </div>

          <div id="ppFields" style="display:none;">
            <label class="form-label">
              PayPal Email
              <input type="email" id="ppEmail" class="form-input" maxlength="80" placeholder="you@paypal.com" />
            </label>
          </div>

          <p id="addMethodError" class="form-error" style="display:none;"></p>
        </div>
      </div>

      <div class="pay-modal-footer">
        <button type="button" class="action-btn" id="saveMethodBtn">Save Method</button>
      </div>
    </div>
  </div>

  <script src="./js/methods.js" defer></script>
</body>

</html>
