services:
  db:
    image: postgres:16-alpine
    container_name: synergy-db
    environment:
      POSTGRES_DB: synergy
      POSTGRES_USER: synergy_user
      POSTGRES_PASSWORD: synergy_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synergy_user -d synergy"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: synergy-app
    environment:
      PORT: 3000
      DATABASE_URL: postgres://synergy_user:synergy_pass@db:5432/synergy
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
