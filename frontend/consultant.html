<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synergy Consulting: Consultant</title>
  <link rel="icon" href="./images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/consultant.css">
</head>

<body>
  <header class="topbar">
    <a class="brand-link" href="./consultant.html">
      <img src="./images/logo.png" alt="Synergy Consulting logo">
      <span>Synergy Consulting</span>
    </a>
    <a class="logout-btn" href="./index.html">Logout</a>
  </header>

  <main class="management-page">
    <div class="page-head">
      <h1>Consultant Dashboard</h1>
      <p class="page-subtitle">Manage availability and booking requests.</p>
    </div>

    <section class="table-card section-card">
      <h2>Manage Availability</h2>
      <div class="inline-form-grid">
        <label class="form-label">
          Consultant Name
          <select id="availabilityConsultantName" class="input-field">
            <option value="" selected disabled>Select consultant</option>
          </select>
        </label>
        <label class="form-label">
          Date
          <input id="availabilityDate" class="input-field" type="date" />
        </label>
        <label class="form-label">
          Time Slot
          <select id="availabilityTime" class="input-field">
            <option value="" selected disabled>Select time slot</option>
            <option value="09:00 AM">09:00 AM</option>
            <option value="10:00 AM">10:00 AM</option>
            <option value="11:00 AM">11:00 AM</option>
            <option value="12:00 PM">12:00 PM</option>
            <option value="01:00 PM">01:00 PM</option>
            <option value="02:00 PM">02:00 PM</option>
            <option value="03:00 PM">03:00 PM</option>
            <option value="04:00 PM">04:00 PM</option>
            <option value="05:00 PM">05:00 PM</option>
          </select>
        </label>
        <button type="button" id="addAvailabilityBtn" class="action-btn">Add Slot</button>
      </div>

      <div class="table-wrap compact-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Consultant</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="availabilityTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="table-card section-card">
      <h2>Booking Lifecycle Management</h2>
      <table>
        <thead>
          <tr>
            <th>BK-ID</th>
            <th>CUS-ID</th>
            <th>Client</th>
            <th>Service</th>
            <th>Consultant</th>
            <th>Date</th>
            <th>Time</th>
            <th>Current Status</th>
            <th>Update Status</th>
          </tr>
        </thead>
        <tbody id="consultantBookingsBody"></tbody>
      </table>
    </section>
  </main>

  <div id="consultantToast" class="toast" aria-live="polite"></div>

  <script src="./js/bookings-data.js" defer></script>
  <script src="./js/consultant.js" defer></script>
</body>

</html>
