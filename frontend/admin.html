<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synergy Consulting: Admin</title>
  <link rel="icon" href="./images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/admin.css">
</head>

<body>
  <header class="topbar">
    <a class="brand-link" href="./admin.html">
      <img src="./images/logo.png" alt="Synergy Consulting logo">
      <span>Synergy Consulting</span>
    </a>
    <a class="logout-btn" href="./index.html">Logout</a>
  </header>

  <main class="management-page">
    <div class="page-head">
      <h1>Admin Dashboard</h1>
      <p class="page-subtitle">Review and update all booking requests.</p>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>BK-ID</th>
            <th>CUS-ID</th>
            <th>Client</th>
            <th>Service</th>
            <th>Consultant</th>
            <th>Date</th>
            <th>Time</th>
            <th>Current Status</th>
            <th>Update Status</th>
          </tr>
        </thead>
        <tbody id="adminBookingsBody"></tbody>
      </table>
    </div>
  </main>

  <div id="adminToast" class="toast" aria-live="polite"></div>

  <script src="./js/bookings-data.js" defer></script>
  <script src="./js/admin.js" defer></script>
</body>

</html>
