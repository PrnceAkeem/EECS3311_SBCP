<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synergy Consulting: Admin</title>
  <link rel="icon" href="./images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/admin.css">
</head>

<body>
  <main class="management-page">
    <div class="page-head">
      <h1>🛡️ Admin Dashboard</h1>
      <p>Review and update booking requests.</p>
    </div>

    <div class="page-links">
      <a href="./booking.html">View Client Bookings</a>
      <a href="./index.html">Logout</a>
    </div>

    <p id="adminMessage" class="page-message" aria-live="polite"></p>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Client</th>
            <th>Service</th>
            <th>Consultant</th>
            <th>Date</th>
            <th>Time</th>
            <th>Current Status</th>
            <th>Update Status</th>
          </tr>
        </thead>
        <tbody id="adminBookingsBody"></tbody>
      </table>
    </div>
  </main>

  <script src="./js/bookings-data.js" defer></script>
  <script src="./js/admin.js" defer></script>
</body>

</html>
