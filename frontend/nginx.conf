server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API calls to the backend service
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # SSE (Server-Sent Events) support — disable buffering so
        # /api/bookings/stream events reach the browser immediately.
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        proxy_set_header       Connection '';
        chunked_transfer_encoding on;
    }

    # Serve static files; fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
