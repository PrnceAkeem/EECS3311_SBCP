<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synergy Consulting Login</title>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="./images/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="./js/index.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="heading">
      <h1> <img src="./images/logo.png" alt="Synergy Consulting Logo">Synergy Consulting</h1>
      <h2>Service Booking & Consulting Platform</h2>
    </div>
    <div class="about">
      At Synergy Consulting, we help our clients optimize IT systems and solve technical challenges with tailored
      solutions
    </div>
    
    <form action="#" method="post">

      <label for="email">EMAIL</label>
      <input type="email" name="email" id="signin-email" placeholder="you@example.com" />

      <label for="password">PASSWORD</label>
      <input type="password" name="password" id="signin-password" placeholder="***********" />

      <p>Demo credentials — password: <strong>pass12345</strong></p>

      <button type="button" id="login-button">Sign In</button>
    </form>
    
  </div>
</body>
</html>
